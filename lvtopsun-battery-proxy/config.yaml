name: "LVTOPSUN Battery BLE Proxy"
description: "Minimal gatttool-based BLE connection holder for LVTOPSUN BMS"
version: "0.1.16"
slug: lvtopsun-battery-proxy
url: "https://github.com/koellcode/ha-lvtopsun-battery-ble"
arch:
  - aarch64
  - amd64
startup: services
boot: manual
init: false
host_dbus: true
host_network: true
options:
  bms_name: "LLM_UNAZAY_0008FR"
  bms_address: ""
  ff00_trigger_hex: "55AA0000"
  scan_timeout: 15
  connect_timeout: 15
  keepalive_interval: 8
  reconnect_delay: 5
  log_level: "info"
schema:
  bms_name: str
  bms_address: str?
  ff00_trigger_hex: str?
  scan_timeout: int
  connect_timeout: int
  keepalive_interval: int(3,300)
  reconnect_delay: int(1,300)
  log_level: list(debug|info|warning|error)
