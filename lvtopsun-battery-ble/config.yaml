name: "LVTOPSUN Battery BLE"
description: "Reads SOC from LVTOPSUN LiFePO4 battery via BLE and publishes to MQTT"
version: "0.1.61"
slug: lvtopsun-battery-ble
url: "https://github.com/koellcode/ha-lvtopsun-battery-ble"
arch:
  - aarch64
  - amd64
startup: services
boot: auto
init: false
hassio_api: true
host_dbus: true
host_network: true
options:
  device_name: "LLM_UNAZAY_0008FR"
  scan_timeout: 10
  connect_timeout: 30
  frame_timeout: 180
  first_burst_timeout: 12
  poll_interval: 30
  retry_delay: 10
  mqtt_host: ""
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  mqtt_topic: "lvtopsun_battery"
  trigger_command: ""
  max_connect_attempts: 20
  log_level: "info"
schema:
  device_name: str
  scan_timeout: int
  connect_timeout: int
  frame_timeout: int(30,600)
  first_burst_timeout: int(3,300)
  poll_interval: int
  retry_delay: int(1,300)
  mqtt_host: str?
  mqtt_port: int
  mqtt_username: str?
  mqtt_password: str?
  mqtt_topic: str
  trigger_command: str?
  max_connect_attempts: int(4,50)
  log_level: list(debug|info|warning|error)
